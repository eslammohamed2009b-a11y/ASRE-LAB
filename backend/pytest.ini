[pytest]
testpaths = tests
markers =
    unit: fast isolated tests that may mock external dependencies (e.g. a stubbed CadQuery module). Never counted as proof that the real CAD kernel works.
    integration: tests exercising multiple real components together in-process (real CadQuery/OCP kernel required, no stubs allowed). FastAPI app is imported and driven via TestClient.
    e2e: full end-to-end tests that start the real FastAPI app as a live server process and call it over real HTTP.
    benchmark: numerical solver validation tests that compare solver output against a known analytical solution or a grid-convergence check. Not mocked; proves numerical correctness, not production performance.
    external: tests that require live third-party credentials/infrastructure (e.g. a real Supabase project). Skipped (never marked passed) when those credentials are not configured in the environment.
addopts = --strict-markers
