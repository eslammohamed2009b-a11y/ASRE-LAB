services:
  api:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      LOCAL_PERSISTENCE_DB_PATH: /data/asre_lab.db
      LOCAL_STORAGE_ROOT: /data/design-files
    volumes:
      - design-files:/data/design-files
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=2
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      LOCAL_PERSISTENCE_DB_PATH: /data/asre_lab.db
      LOCAL_STORAGE_ROOT: /data/design-files
    volumes:
      - design-files:/data/design-files
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  design-files:
  redis-data:
